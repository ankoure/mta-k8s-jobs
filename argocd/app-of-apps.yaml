apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mta-k8s-jobs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ankoure/mta-k8s-jobs.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
